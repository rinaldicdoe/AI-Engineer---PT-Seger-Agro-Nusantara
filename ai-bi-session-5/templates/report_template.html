<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Weekly Sales Report</title>
<style>
  body { font-family: Arial, sans-serif; background:#f6f8fb; color:#152335; margin:0; }
  .container { max-width: 900px; margin: 32px auto; background:white; padding: 36px; border-radius: 18px; box-shadow: 0 12px 36px rgba(15,23,42,.12); }
  .meta { color:#64748b; font-size: 13px; margin-bottom: 24px; }
  h1 { color:#061b2d; margin-top:0; font-size: 30px; }
  h2 { color:#123c69; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; margin-top: 28px; }
  table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 13px; }
  th, td { border: 1px solid #e6eaf0; padding: 8px 10px; text-align:left; }
  th { background:#061b2d; color:white; }
  code { background:#f1f5f9; padding:2px 5px; border-radius:4px; }
  li { margin-bottom: 6px; }
  .footer { margin-top:36px; font-size:12px; color:#64748b; }
</style>
</head>
<body>
  <div class="container">
    <div class="meta">Generated by {{ owner }}{% if metadata.start_date %} | Period: {{ metadata.start_date }} to {{ metadata.end_date }}{% endif %}</div>
    {{ content | safe }}
    <div class="footer">Auto-generated report. Review angka penting sebelum distribusi eksternal.</div>
  </div>
</body>
</html>
